<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#4164a5" />
    <title>오프라인 - Not a Trip</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8f9fa;
        color: #1a2842;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .retry-btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #4164a5;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .retry-btn:hover {
        background: #345084;
      }
      .retry-btn:active {
        background: #273c63;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>인터넷 연결이 없습니다</h1>
      <p>
        네트워크 연결을 확인하고 다시 시도해주세요.<br />Wi-Fi 또는 모바일
        데이터를 켜주세요.
      </p>
      <button class="retry-btn" onclick="location.reload()">다시 시도</button>
    </div>
  </body>
</html>
