name: '🧹 Chore / Refactor'
description: 리팩터링, 환경 설정, 빌드/의존성/CI 작업
title: '[Chore] 한 줄 요약' # 예: [Chore] ESLint/Prettier 규칙 정리

body:
  - type: dropdown
    id: type
    attributes:
      label: 🏷️ Type
      description: '작업 유형을 선택하세요 (커밋 prefix 기준)'
      options:
        - Chore # 빌드, 설정, 패키지 설치 등 비기능 작업
        - Refactor # 기능 변경 없이 코드 구조 개선
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🎯 목적/배경
      description: '이 작업이 필요한 이유나 배경을 간단히 작성하세요.'
      placeholder: |
        예시)
        - React Query 훅과 API 호출 로직이 섞여 있어서 재사용이 어려움
        - ESLint/Prettier 규칙이 맞지 않아 팀 코딩 스타일이 제각각임
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: 📋 작업 내용
      description: '작업해야 할 내용을 체크리스트 형태로 정리하세요.'
      placeholder: |
        - [ ] Vite/TS 설정 정리 (`tsconfig`, `vite.config` 등)
        - [ ] ESLint/Prettier 규칙 정리 및 적용
        - [ ] React Query 훅 / API 도메인 함수 분리
        - [ ] 공통 UI 컴포넌트 폴더 구조 정리
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: ✅ 수용조건 (AC)
      description: '작업 완료 여부를 판단할 수 있는 조건을 작성하세요. (Given-When-Then 형식 권장)'
      placeholder: |
        - [ ] `npm run lint` / `npm run build` 가 모두 통과한다.
        - [ ] 팀 합의된 코드 스타일이 ESLint/Prettier로 강제된다.
        - [ ] 주요 도메인 로직이 정해둔 위치(예: `src/api`, `src/store`)에 정리되어 있다.
    validations:
      required: true

  - type: input
    id: links
    attributes:
      label: 🔗 참고 링크 (선택)
      placeholder: '기존 설정 파일, 레퍼런스 문서, 블로그 글 등'

  - type: markdown
    attributes:
      value: |
        ---
        💡 **브랜치 규칙:** `chore/{이슈번호}--{요약}`  
        예) `chore/20--lint-prettier-setup`  
        💡 **커밋 prefix 예시:** chore, refactor
