name: '🎨 UI/UX Improvement'
description: UI 개선, 스타일 수정, 사용성 개선 작업
title: '[UI] 한 줄 요약' # 예: [UI] 메인 페이지 반응형 레이아웃 개선

body:
  - type: dropdown
    id: type
    attributes:
      label: 🏷️ Type
      description: '작업 유형을 선택하세요 (커밋 prefix 기준)'
      options:
        - UI # UI/UX 개선, 스타일 수정
        - Style # 코드 스타일, 포맷팅 (기능 변경 없음)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🎯 개선 목적/배경
      description: 'UI 개선이 필요한 이유를 적어주세요.'
      placeholder: |
        예시)
        - 모바일에서 버튼이 너무 작아서 터치하기 어려움
        - 현재 색상 대비가 낮아 접근성 문제가 있음
        - 로딩 상태에서 사용자 피드백이 부족함
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: 📸 현재 상태
      description: '현재 UI의 문제점이나 개선 전 상태를 설명하세요.'
      placeholder: |
        - 현재 버튼 크기: 32px × 24px (모바일에서 터치 어려움)
        - 색상 대비: #666 on #fff (WCAG AA 기준 미달)
        - 로딩 시 아무 표시 없음
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: 📋 개선 내용
      description: '구체적인 UI 개선 작업을 체크리스트로 작성하세요.'
      placeholder: |
        - [ ] 버튼 최소 크기를 44px × 44px로 조정 (터치 접근성)
        - [ ] 색상 대비를 WCAG AA 기준에 맞게 조정
        - [ ] 로딩 스피너 및 스켈레톤 UI 추가
        - [ ] 모바일/태블릿/데스크톱 반응형 테스트
        - [ ] 다크모드 지원 (필요시)
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: ✨ 기대 결과
      description: '개선 후 어떤 모습이 될지 설명하세요.'
      placeholder: |
        - 모든 디바이스에서 편리한 터치/클릭 경험
        - 시각적 접근성 개선 (색상 대비, 폰트 크기)
        - 명확한 상태 피드백 (로딩, 성공, 에러)
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: ✅ 수용조건 (AC)
      description: 'UI 개선 완료 여부를 판단할 수 있는 기준을 작성하세요.'
      placeholder: |
        예시)
        Given 사용자가 모바일 디바이스에서 접속했을 때
        When 주요 버튼들을 터치하면
        Then 44px 이상의 터치 영역으로 쉽게 클릭할 수 있다.
        
        And 색상 대비가 WCAG AA 기준(4.5:1 이상)을 만족한다.
    validations:
      required: true

  - type: input
    id: design_links
    attributes:
      label: 🎨 디자인 참고 (선택)
      placeholder: 'Figma 링크, 디자인 시안, 참고 사이트 등'

  - type: markdown
    attributes:
      value: |
        ---
        💡 **브랜치 규칙:** `ui/{이슈번호}--{요약}`  
        예) `ui/15--mobile-button-size`  
        💡 **커밋 prefix 예시:** UI, Style