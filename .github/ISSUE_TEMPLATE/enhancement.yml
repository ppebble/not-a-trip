name: '⚡ Enhancement'
description: 기존 기능 개선, 성능 최적화, 사용성 향상
title: '[Enhancement] 한 줄 요약' # 예: [Enhancement] 검색 성능 최적화

body:
  - type: dropdown
    id: type
    attributes:
      label: 🏷️ Type
      description: '작업 유형을 선택하세요 (커밋 prefix 기준)'
      options:
        - Enhancement # 기존 기능 개선
        - Perf # 성능 최적화
        - Refactor # 코드 구조 개선 (기능 변경 없음)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🎯 개선 목적/배경
      description: '기존 기능을 개선해야 하는 이유를 적어주세요.'
      placeholder: |
        예시)
        - 현재 검색 기능이 느려서 사용자 경험이 좋지 않음
        - API 호출이 너무 많아 불필요한 네트워크 비용 발생
        - 코드 중복이 많아 유지보수가 어려움
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: 📊 현재 동작/문제점
      description: '현재 어떻게 동작하고 있고, 어떤 문제가 있는지 설명하세요.'
      placeholder: |
        - 검색어 입력할 때마다 API 호출 (디바운싱 없음)
        - 평균 응답 시간: 2-3초
        - 동일한 검색어로 중복 요청 발생
        - 메모리 사용량이 지속적으로 증가
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: 📋 개선 내용
      description: '구체적인 개선 작업을 체크리스트로 작성하세요.'
      placeholder: |
        - [ ] 검색어 디바운싱 적용 (300ms)
        - [ ] React Query 캐싱으로 중복 요청 방지
        - [ ] 검색 결과 가상화(virtualization) 적용
        - [ ] 불필요한 리렌더링 최적화 (React.memo, useMemo)
        - [ ] 성능 측정 및 비교 테스트
    validations:
      required: true

  - type: textarea
    id: expected_improvement
    attributes:
      label: ✨ 기대 개선 효과
      description: '개선 후 어떤 효과를 기대하는지 구체적으로 작성하세요.'
      placeholder: |
        - 검색 응답 시간: 2-3초 → 500ms 이하
        - API 호출 횟수: 90% 감소 (캐싱 효과)
        - 메모리 사용량: 30% 감소
        - 사용자 만족도 향상 (빠른 검색 경험)
    validations:
      required: true

  - type: textarea
    id: ac
    attributes:
      label: ✅ 수용조건 (AC)
      description: '개선 완료 여부를 판단할 수 있는 기준을 작성하세요.'
      placeholder: |
        예시)
        Given 사용자가 검색어를 입력했을 때
        When 300ms 이내에 추가 입력이 없으면
        Then API 요청이 1회만 발생한다.
        
        And 동일한 검색어로 재검색 시 캐시된 결과를 즉시 표시한다.
        And 검색 결과 표시 시간이 500ms 이하이다.
    validations:
      required: true

  - type: textarea
    id: performance_metrics
    attributes:
      label: 📈 성능 지표 (선택)
      description: '측정할 성능 지표나 벤치마크를 작성하세요.'
      placeholder: |
        - 응답 시간 (Response Time)
        - 처리량 (Throughput)
        - 메모리 사용량 (Memory Usage)
        - 번들 크기 (Bundle Size)

  - type: input
    id: links
    attributes:
      label: 🔗 참고 자료 (선택)
      placeholder: '성능 분석 도구, 벤치마크 결과, 기술 문서 등'

  - type: markdown
    attributes:
      value: |
        ---
        💡 **브랜치 규칙:** `enhancement/{이슈번호}--{요약}`  
        예) `enhancement/25--search-performance`  
        💡 **커밋 prefix 예시:** Enhancement, Perf, Refactor